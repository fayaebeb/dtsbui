<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="bg-grid">
  <main class="container center-screen">
    <section class="card card-lg">
      <header class="stack gap-sm align-center">
        <div class="brand">
          <span class="brand-badge">DTSB</span>
          <span class="brand-sub">Admin</span>
        </div>
        <h1 class="title">Sign in</h1>
      </header>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="stack gap-xs">
        {% for category, msg in messages %}
        <div class="alert error">{{ msg }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      <form class="stack gap-md" method="post" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" required placeholder="Enter your username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required placeholder="Enter your password">
        </div>
        <button class="btn primary w-full" type="submit">Login</button>
      </form>

      <footer class="muted center mt-sm">© <span id="year"></span> DTSB</footer>
    </section>
  </main>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
