<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="bg-soft">
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <span class="brand-badge">DTSB</span>
        <span class="brand-sub">Admin</span>
      </div>

      <nav class="actions" style="display:flex; gap:1rem; align-items:center;">
        <a href="/admin/sim" class="btn outline" target="_blank">Sim Preview</a>
        <form method="post" action="/admin/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="btn outline" type="submit">Logout</button>
        </form>
      </nav>
    </div>
  </header>

  <main class="container stack gap-xl py-lg">
    <section class="card">
      <header class="section-header">
        <div>
          <h2>Upload Simulation</h2>
          <p class="muted">Upload a .zip file to add a new simulation.</p>
        </div>
      </header>
      <form id="uploadForm" class="grid grid-auto gap-sm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input class="file-input" type="file" name="file" id="zipFile" accept=".zip" required>
        <button class="btn primary" type="submit">Upload</button>
      </form>
      <div class="stack gap-xs mt-sm">
        <progress id="prog" max="100" value="0" class="progress"></progress>
        <div id="uploadStatus" class="muted"></div>
      </div>
    </section>

    <section class="card">
      <header class="section-header">
        <div>
          <h2>All Simulations</h2>
          <p class="muted">Manage publication, parsing, and removal.</p>
        </div>
        <button id="refreshBtn" class="btn subtle">Refresh</button>
      </header>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th style="width:80px">ID</th>
              <th>Name</th>
              <th style="width:120px">Published</th>
              <th style="width:180px">Uploaded</th>
              <th style="width:120px">Size</th>
              <th style="width:160px">Parse Status</th>
              <th style="width:260px">Actions</th>
            </tr>
          </thead>
          <tbody id="simsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    function getCsrf() {
      const inp = document.querySelector('input[name="csrf_token"]');
      if (inp && inp.value) return inp.value;
      const meta = document.querySelector('meta[name="csrf-token"]');
      return meta ? meta.content : null;
    }
    const csrf = getCsrf();

    const numberFmt = new Intl.NumberFormat();
    const statusLabels = {
      idle: 'Not parsed',
      queued: 'Queued',
      running: 'Parsing...',
      succeeded: 'Ready',
      failed: 'Failed'
    };
    const statusBadges = {
      idle: 'badge',
      queued: 'badge info',
      running: 'badge info',
      succeeded: 'badge success',
      failed: 'badge danger'
    };
    const activePolls = new Map();
    const POLL_DELAY_MS = 4000;

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value).replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch] || ch));
    }

    function stopPolling(simId) {
      const handle = activePolls.get(simId);
      if (handle) {
        clearTimeout(handle);
      }
      activePolls.delete(simId);
    }

    function pollStatus(simId) {
      fetch(`/admin/api/simulations/${simId}/parse/status`, { credentials: 'same-origin' })
        .then((res) => (res.ok ? res.json() : Promise.reject(new Error('status fetch failed'))))
        .then((data) => {
          const status = (data && data.status) ? String(data.status).toLowerCase() : 'idle';

          const tr = [...document.querySelectorAll("#simsBody tr")]
            .find((r) => r.firstElementChild && r.firstElementChild.textContent.trim() === simId);

          if (tr && data && data.simulation) {
            const parseCell = tr.querySelector("td:nth-child(6)");
            if (parseCell) {
              parseCell.innerHTML = formatParseCell(data.simulation);
            }
          }

          if (status === 'queued' || status === 'running') {
            const handle = setTimeout(() => pollStatus(simId), POLL_DELAY_MS);
            activePolls.set(simId, handle);
          } else {
            stopPolling(simId);
            refresh();
          }
        })
        .catch(() => {
          stopPolling(simId);
          refresh();
        });
    }

    function ensurePolling(simId) {
      if (!activePolls.has(simId)) {
        activePolls.set(simId, null);
        pollStatus(simId);
      }
    }

    function formatParseCell(row) {
      const status = (row.parse_status || (row.cached_json_path ? 'succeeded' : 'idle')).toLowerCase();
      const label = statusLabels[status] || status;
      const badgeClass = statusBadges[status] || 'badge';
      const pieces = [`<span class="${badgeClass}">${label}</span>`];
      if (typeof row.parsed_person_count === 'number') {
        pieces.push(`<small class="muted">${numberFmt.format(row.parsed_person_count)} persons</small>`);
      }
      if (row.parse_error) {
        pieces.push(`<small class="muted">Error: ${escapeHtml(row.parse_error)}</small>`);
      }
      return `<div class="stack gap-xxs">${pieces.map((p) => `<div>${p}</div>`).join('')}</div>`;
    }

    async function refresh() {
      const res = await fetch('/admin/api/simulations', { credentials: 'same-origin' });
      if (!res.ok) return;
      const rows = await res.json();
      const tb = document.getElementById('simsBody');
      tb.innerHTML = '';
      rows.forEach((r) => {
        const status = (r.parse_status || (r.cached_json_path ? 'succeeded' : 'idle')).toLowerCase();
        const tr = document.createElement('tr');
        const safeName = escapeHtml(r.name || '');
        const sizeText = typeof r.size === 'number' ? numberFmt.format(r.size) : (r.size || '');
        const parseCell = formatParseCell(r);
        const parseLabel = status === 'succeeded' ? 'Re-parse' : (status === 'failed' ? 'Retry Parse' : 'Parse/Cache');
        tr.innerHTML = `
          <td>${r.id}</td>
          <td class="cell-ellipsis" title="${safeName}">${safeName}</td>
          <td>${r.published ? '<span class="badge success">Yes</span>' : '<span class="badge">No</span>'}</td>
          <td>${r.uploaded_at}</td>
          <td>${sizeText}</td>
          <td>${parseCell}</td>
          <td>
            <div class="actions">
              <button class="btn small ${r.published ? 'warning' : 'secondary'}" data-act="publish">${r.published ? 'Unpublish' : 'Publish'}</button>
              <button class="btn small secondary" data-act="parse">${parseLabel}</button>
              <button class="btn small danger" data-act="delete">Delete</button>
            </div>
          </td>`;

        const publishBtn = tr.querySelector('[data-act="publish"]');
        const parseBtn = tr.querySelector('[data-act="parse"]');
        const deleteBtn = tr.querySelector('[data-act="delete"]');

        publishBtn.onclick = async () => {
          const resp = await fetch(`/admin/api/simulations/${r.id}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              ...(csrf ? { 'X-CSRFToken': csrf } : {})
            },
            body: JSON.stringify({ published: !r.published }),
            credentials: 'same-origin'
          });
          if (!resp.ok) alert('Publish toggle failed');
          refresh();
        };

        parseBtn.onclick = async () => {
          if (parseBtn.disabled) return;
          const originalText = parseBtn.textContent;
          parseBtn.disabled = true;
          parseBtn.textContent = 'Starting...';
          try {
            const resp = await fetch(`/admin/api/simulations/${r.id}/parse`, {
              method: 'POST',
              headers: { ...(csrf ? { 'X-CSRFToken': csrf } : {}) },
              credentials: 'same-origin'
            });
            let payload = null;
            try {
              payload = await resp.json();
            } catch (_) { }
            if (!resp.ok) {
              alert(payload?.error || 'Parse failed');
              parseBtn.disabled = false;
              parseBtn.textContent = originalText;
              return;
            }
            const nextStatus = payload?.status ? String(payload.status).toLowerCase() : status;
            if (nextStatus === 'queued' || nextStatus === 'running') {
              parseBtn.textContent = nextStatus === 'running' ? 'Parsing...' : 'Queued...';
              ensurePolling(r.id);
            } else if (nextStatus === 'succeeded') {
              parseBtn.textContent = 'Re-parse';
            } else if (nextStatus === 'failed') {
              parseBtn.textContent = 'Retry Parse';
            } else {
              parseBtn.textContent = originalText;
            }
            refresh();
          } catch (err) {
            console.error('Parse failed', err);
            alert(err?.message || 'Parse failed');
            parseBtn.disabled = false;
            parseBtn.textContent = originalText;
          }
        };

        deleteBtn.onclick = async () => {
          if (!confirm('Delete this simulation?')) return;
          stopPolling(r.id);
          const resp = await fetch(`/admin/api/simulations/${r.id}`, {
            method: 'DELETE',
            headers: { ...(csrf ? { 'X-CSRFToken': csrf } : {}) },
            credentials: 'same-origin'
          });
          if (!resp.ok) alert('Delete failed');
          refresh();
        };

        if (status === 'queued' || status === 'running') {
          parseBtn.disabled = true;
          parseBtn.textContent = status === 'running' ? 'Parsing...' : 'Queued...';
          ensurePolling(r.id);
        } else {
          stopPolling(r.id);
        }

        tb.appendChild(tr);
      });
    }

    async function uploadWithProgress(file, csrf) {
      const prog = document.getElementById('prog');
      if (prog) {
        prog.max = 100;
        prog.value = 0;
      }
      const baseHeaders = csrf ? { 'X-CSRFToken': csrf } : {};
      const sasRes = await fetch('/admin/api/upload-sas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...baseHeaders },
        body: JSON.stringify({ filename: file.name }),
        credentials: 'same-origin'
      });
      if (!sasRes.ok) {
        let msg = 'SAS request failed';
        try {
          const data = await sasRes.json();
          if (data?.error) msg = data.error;
        } catch (_) { }
        throw new Error(msg);
      }
      const { sasUrl, blobName } = await sasRes.json();
      if (!sasUrl || !blobName) throw new Error('Invalid SAS response');

      const azure = window.AzureStorage || {};
      const BlockBlobClientCtor = azure.BlockBlobClient;
      if (!BlockBlobClientCtor) {
        throw new Error('Azure storage SDK not loaded');
      }
      const client = new BlockBlobClientCtor(sasUrl);
      await client.uploadBrowserData(file, {
        blockSize: 4 * 1024 * 1024,
        concurrency: 8,
        onProgress: (evt) => {
          if (!prog || !file.size) return;
          const pct = Math.min(100, Math.round((evt.loadedBytes / file.size) * 100));
          prog.value = pct;
        }
      });
      if (prog) prog.value = 100;

      const importRes = await fetch('/admin/api/simulations/register-blob', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...baseHeaders },
        body: JSON.stringify({ blob_name: blobName, original_name: file.name }),
        credentials: 'same-origin'
      });
      if (!importRes.ok) {
        let msg = 'Import failed';
        try {
          const data = await importRes.json();
          if (data?.error) msg = data.error;
        } catch (_) { }
        throw new Error(msg);
      }
      return importRes.json();
    }

    let uploading = false;
    window.addEventListener('beforeunload', (e) => {
      if (!uploading) return;
      e.preventDefault();
      e.returnValue = '';
    });

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fileEl = document.getElementById('zipFile');
      const f = fileEl && fileEl.files ? fileEl.files[0] : null;
      const st = document.getElementById('uploadStatus');
      const prog = document.getElementById('prog');
      if (!f) {
        st.textContent = 'Please choose a .zip file.';
        return;
      }
      if (prog) {
        prog.value = 0;
        prog.max = 100;
      }
      st.textContent = 'Preparing upload...';
      uploading = true;
      try {
        const resp = await uploadWithProgress(f, csrf, st);
        st.textContent = resp?.simulation?.name ? `Imported ${resp.simulation.name}` : 'Upload complete';
        if (fileEl) fileEl.value = '';
        refresh();
      } catch (err) {
        console.error('Upload failed', err);
        st.textContent = err?.message || 'Upload failed';
        if (prog) prog.value = 0;
      } finally {
        uploading = false;
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', refresh);
    refresh();
  </script>

  <script type="module">
    import { BlockBlobClient } from "https://esm.sh/@azure/storage-blob@12.16.0";
    window.AzureStorage = { BlockBlobClient };
  </script>

</body>

</html>
