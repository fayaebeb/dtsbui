name: Build and deploy Python app to Azure Web App - dtsb

on:
  push:
    branches:
      - admin
  workflow_dispatch:

concurrency:
  group: deploy-dtsb
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (verify requirements)
        run: |
          if [ ! -f requirements.txt ]; then
            echo "requirements.txt missing"; exit 1
          fi
          pip install -r requirements.txt
          # (Optional) run tests here

      - name: Verify Procfile exists
        run: |
          if [ ! -f Procfile ]; then
            echo "Procfile missing. Create one with: web: gunicorn server:app --workers 2 --threads 8 --timeout 120"
            exit 1
          fi

      # Package the repo (excluding venv/tests if present)
      - name: Create deployment zip
        run: |
          zip -r app.zip . -x "venv/*" ".git/*" "**/__pycache__/*"

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: dtsb
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app.zip
