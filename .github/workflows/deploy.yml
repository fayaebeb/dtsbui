name: Build and deploy Python app to Azure Web App - dtsb

on:
  push:
    branches: [ admin ]
  workflow_dispatch:

concurrency:
  group: deploy-dtsb
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sanity checks
        run: |
          test -f Procfile || (echo "Missing Procfile"; exit 1)
          test -f requirements.txt || (echo "Missing requirements.txt"; exit 1)
          # IMPORTANT: ensure filename casing is correct
          test -f server.py || (echo "Missing server.py (case-sensitive on Linux!)"; exit 1)
          test ! -f server.PY || (echo "Remove server.PY (case-sensitive conflict on Linux)"; exit 1)

      # Install dependencies into a local folder that we will ship
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target="./.python_packages/lib/site-packages"

      # Zip the app (including the .python_packages folder)
      - name: Create deployment package
        run: |
          zip -r app.zip . -x ".git/*" ".github/*" "__pycache__/*" "*.pyc"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: dtsb
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: app.zip
