name: Build and deploy Python app to Azure Web App - dtsb

on:
  push:
    branches: [ admin ]
  workflow_dispatch:

concurrency:
  group: deploy-dtsb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v4

      # (Optional) sanity checks in CI; Oryx will do the real install on Azure
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - name: Verify Procfile & requirements.txt
        run: |
          test -f Procfile || (echo "Missing Procfile"; exit 1)
          test -f requirements.txt || (echo "Missing requirements.txt"; exit 1)

      - name: Deploy to Azure Web App (source)
        uses: azure/webapps-deploy@v3
        with:
          app-name: dtsb
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}